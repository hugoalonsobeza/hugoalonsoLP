<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F0EDE3"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.85" r="0.6">
      <stop offset="0%" stop-color="#E04E1A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#E04E1A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Eyebrow -->
  <circle cx="80" cy="100" r="6" fill="#E04E1A"/>
  <text x="100" y="106" font-family="Inter, sans-serif" font-size="20" font-weight="500"
        fill="#6B6B66" letter-spacing="4">FREELANCE · WEBS &amp; MARKETING DIGITAL</text>

  <!-- Nombre -->
  <text x="80" y="320" font-family="Inter, system-ui, sans-serif" font-size="180" font-weight="500"
        fill="#0A0A0A" letter-spacing="-6">Hugo Alonso</text>

  <text x="80" y="440" font-family="Georgia, serif" font-style="italic" font-size="120"
        fill="#6B6B66" letter-spacing="-2">Bezanilla.</text>

  <!-- Subtítulo -->
  <text x="80" y="540" font-family="Inter, sans-serif" font-size="28" fill="#0A0A0A" opacity="0.78">
    Perfil híbrido — ADE + Ingeniería Informática.
  </text>
  <text x="80" y="580" font-family="Inter, sans-serif" font-size="28" fill="#0A0A0A" opacity="0.78">
    Webs y marketing digital · Donostia, ES.
  </text>

  <!-- Marca abajo derecha -->
  <text x="1120" y="600" text-anchor="end" font-family="ui-monospace, monospace"
        font-size="18" fill="#6B6B66" letter-spacing="2">HUGOALONSO.STUDIO</text>
</svg>
